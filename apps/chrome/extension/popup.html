<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>The Agent Times</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <div class="title-row">
          <img src="icons/icon48.png" alt="" class="logo" />
          <div class="title-block">
            <h1 class="title">The Agent Times</h1>
            <p class="subtitle">The newsroom's browser</p>
          </div>
        </div>
        <span id="status-dot" class="status-dot" title="Inactive">
          <span class="status-dot-ping"></span>
          <span class="status-dot-core"></span>
        </span>
      </div>

      <div class="card-footer">
        <button id="connect-btn" class="btn btn-primary">Connect</button>
        <div class="meta-row">
          <span id="version" class="version"></span>
          <span class="meta-spacer"></span>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
